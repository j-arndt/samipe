name: RTL Verification & Python Tests
on:
  push:
    branches: [main]
    paths: ['rtl/**', 'impl/**', 'sim/**']
  pull_request:
    paths: ['rtl/**', 'impl/**', 'sim/**']

jobs:
  python-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy scipy

      - name: Run functional tests
        run: python3 sim/functional_test.py

      - name: Run RTL equivalence checks
        run: cd impl && python3 rtl_equiv.py

      - name: Run benchmarks
        run: cd impl && python3 bench.py

  verilator-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Verilator
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator

      - name: Lint all RTL modules
        run: |
          cd rtl
          verilator --lint-only samipe_cde_firewall.v
          verilator --lint-only samipe_configurable.v
          verilator --lint-only samipe_interface_ctl.v
          echo "All RTL files pass Verilator lint"

  yosys-synthesis:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Yosys
        run: |
          sudo apt-get update
          sudo apt-get install -y yosys

      - name: Run generic synthesis (no PDK)
        run: |
          cd rtl
          yosys -s synth_generic.ys 2>&1 | tee yosys_output.log
          echo ""
          echo "=== Synthesis Report ==="
          cat synth_report_generic.txt

      - name: Upload synthesis report
        uses: actions/upload-artifact@v4
        with:
          name: synthesis-report
          path: |
            rtl/synth_report_generic.txt
            rtl/synth_netlist_generic.v
